version: '3.9'

services:
  backend:
    build:
      context: ./oxygenbackend/quizapi
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__PostgresConnection=Host=postgres;Database=OxygenQuiz;Username=postgres;Password=123
      - ASPNETCORE_ENVIRONMENT=Development
      # Dev-only secrets so the container boots (user-secrets aren't available inside the
      # container, and the app fails fast without these). Use real secrets in production —
      # never these committed values.
      - Jwt__Key=dev-only-insecure-key-change-in-production-0123456789
      - Seed__AdminPassword=admin

  frontend:
    build:
      context: . 
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: OxygenQuiz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB removed: multiplayer chat is ephemeral and nothing is persisted to Mongo.
  # See docs/mongodb.md to restore it for the future persistent chat system.
volumes:
  postgres-data: