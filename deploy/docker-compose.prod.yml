# Production stack for OxygenQuiz on a single VPS (see docs/deployment/production-runbook.md).
# Runs three containers: Caddy (TLS + reverse proxy + SPA static host), the .NET
# backend, and PostgreSQL. The frontend is built locally and its dist/ is served by
# Caddy from ./frontend-dist. Secrets live in ./.env (copied from .env.example).
#
#   Bring up:  docker compose -f docker-compose.prod.yml up -d --build
#   Logs:      docker compose -f docker-compose.prod.yml logs -f backend
#   Down:      docker compose -f docker-compose.prod.yml down

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend-dist:/srv:ro          # built SPA (npm run build → dist/)
      - ./certs:/etc/caddy/certs:ro       # Cloudflare Origin certificate + key
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

  backend:
    build:
      context: ../OxygenBackend/QuizAPI
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Built here so the DB password is defined once (in .env as POSTGRES_PASSWORD).
      ConnectionStrings__PostgresConnection: "Host=postgres;Database=OxygenQuiz;Username=postgres;Password=${POSTGRES_PASSWORD}"
      # Gate signup behind single-use invite codes. Set false to reopen public signup.
      Signup__RequireInviteCode: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/wwwroot/uploads   # uploads survive redeploys
    expose:
      - "8080"

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: OxygenQuiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  backend-uploads:
  caddy-data:
  caddy-config:
