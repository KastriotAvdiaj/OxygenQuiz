# Local development database only (no app images).
# Brings up PostgreSQL with a host port that matches appsettings.json, so you can run the
# API/frontend on your machine and point them at this container.
#
#   Start:   docker compose -f docker-compose.dev.yml up -d
#   Stop:    docker compose -f docker-compose.dev.yml down
#   Wipe:    docker compose -f docker-compose.dev.yml down -v   (also deletes the data volume)
#
# Postgres → localhost:5433, db OxygenQuiz, user/pass postgres/123  (matches PostgresConnection)
#
# MongoDB was removed — multiplayer chat is ephemeral. See docs/mongodb.md to bring it back
# for the future persistent chat system.

services:
  postgres:
    image: postgres:15
    container_name: oxygen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: OxygenQuiz
    # Host port 5433 → container 5432, because appsettings.json uses Port=5433.
    ports:
      - "5433:5432"
    volumes:
      - oxygen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oxygen-postgres-data:
